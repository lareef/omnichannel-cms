{% if ai_reply %}
<div class="bg-amber-50 border border-amber-200 rounded p-3 mt-2">
    <h4 class="text-sm font-medium text-amber-800 mb-2">AI Suggested Reply:</h4>
    <div class="text-sm text-gray-700 whitespace-pre-wrap">{{ ai_reply }}</div>
    <button type="button"
            onclick="document.getElementById('id_comment').value = this.previousElementSibling.textContent;"
            class="mt-2 bg-amber-600 text-white px-3 py-1 rounded text-xs hover:bg-amber-700">
        Use This Reply
    </button>
</div>
{% endif %}

{% if translation %}
<div class="bg-green-50 border border-green-200 rounded p-3 mt-2">
    <h4 class="text-sm font-medium text-green-800 mb-2">Translation ({{ target_lang }}):</h4>
    <div class="text-sm text-gray-700 whitespace-pre-wrap">{{ translation }}</div>
    <button type="button"
            onclick="document.getElementById('id_comment').value += '\n\n' + this.previousElementSibling.textContent;"
            class="mt-2 bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700">
        Append Translation
    </button>
</div>
{% endif %}

{% if error %}
<div class="bg-red-50 border border-red-200 rounded p-3 mt-2">
    <div class="text-sm text-red-700">{{ error }}</div>
</div>
{% endif %}

<div class="space-y-2">
    {% for update in updates %}
        <div class="text-sm border-l-4 pl-3 {% if update.update_type == 'comment' %}border-blue-300{% else %}border-green-300{% endif %}">
            <p class="text-gray-600">
                <span class="font-medium">{{ update.updated_by.get_full_name|default:"System" }}</span>
                <span class="text-xs text-gray-500" title="{{ update.created_at|date:"M j, Y, g:i a" }}">{{ update.created_at|timesince }} ago</span>
            </p>
            <p>{{ update.comment }}</p>
            <!-- other change details -->
        </div>
    {% empty %}
        <p class="text-gray-500">No recent activity.</p>
    {% endfor %}
</div>

{% extends 'base.html' %}

{% block title %}
  Confirm Delete
{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="bg-white shadow rounded-lg p-6 text-center">
      <h1 class="text-xl font-bold text-gray-900 mb-4">Confirm Delete</h1>
      <p class="text-gray-600 mb-6">Are you sure you want to delete "{{ object.name }}"?</p>
      <form method="post">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
          <a href="{% url 'tickets:escalation_policy_list' %}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
          <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Delete</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

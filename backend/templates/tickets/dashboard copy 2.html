{% extends 'base.html' %}
{% load static %}

{% block title %}Ticket Dashboard{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Ticket Dashboard</h1>

<!-- Stats Cards -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <!-- Open Tickets -->
    <a href="?open=1" class="block bg-white overflow-hidden shadow rounded-lg hover:shadow-lg transition-shadow duration-200">
        <div class="p-5">
            <div class="flex items-center">
                <div class="flex-shrink-0 bg-indigo-500 rounded-md p-3">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="text-sm font-medium text-gray-500 truncate">Open Tickets</dt>
                        <dd class="text-lg font-medium text-gray-900">{{ open_tickets_count }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </a>

    <!-- Unassigned -->
    <a href="?assignment=unassigned" class="block bg-white overflow-hidden shadow rounded-lg hover:shadow-lg transition-shadow duration-200">
        <div class="p-5">
            <div class="flex items-center">
                <div class="flex-shrink-0 bg-yellow-500 rounded-md p-3">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="text-sm font-medium text-gray-500 truncate">Unassigned</dt>
                        <dd class="text-lg font-medium text-gray-900">{{ unassigned_count }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </a>

    <!-- Overdue Response -->
    <a href="?overdue_response=1" class="block bg-white overflow-hidden shadow rounded-lg hover:shadow-lg transition-shadow duration-200">
        <div class="p-5">
            <div class="flex items-center">
                <div class="flex-shrink-0 bg-red-500 rounded-md p-3">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="text-sm font-medium text-gray-500 truncate">Response Overdue</dt>
                        <dd class="text-lg font-medium text-gray-900">{{ overdue_response_count }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </a>

    <!-- My Tickets -->
    <a href="?assignment=assigned_to_me" class="block bg-white overflow-hidden shadow rounded-lg hover:shadow-lg transition-shadow duration-200">
        <div class="p-5">
            <div class="flex items-center">
                <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="text-sm font-medium text-gray-500 truncate">My Tickets</dt>
                        <dd class="text-lg font-medium text-gray-900">{{ my_tickets_count }}</dd>
                    </dl>
                </div>
            </div>
        </div>
    </a>
</div>

<!-- Modal 
<div id="modal" class="fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center hidden z-50" _="on click if event.target.id == 'modal' add .hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto relative">
        <button type="button" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10" _="on click add .hidden to #modal">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <div class="p-6" id="modal-content">
        </div>
    </div>
</div>
-->

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden" 
     _="on click if event.target.id == 'modal' add .hidden">
    <!-- Backdrop with blur -->
    <div class="absolute inset-0 bg-gray-500 bg-opacity-75 transition-opacity backdrop-blur-sm"></div>

    <!-- Modal panel -->
    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-4xl">
                <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4" id="modal-content">
                    <!-- Content will be injected by HTMX -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <h2 class="text-2xl font-bold mb-6">Reset Password Done</h2>
    <p class="mb-4">We've sent you an email with instructions to reset your password.</p>
    {% crispy form %}
    <p class="mt-4">
        <a href="{% url 'account_login' %}" class="text-indigo-600">Back to login</a>
    </p>
</div>
{% endblock %}

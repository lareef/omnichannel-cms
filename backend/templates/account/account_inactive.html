{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-12 text-center">
    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4">
        <div class="flex">
            <div class="flex-shrink-0">
                <svg class="h-5 w-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <div class="ml-3">
                <h3 class="text-lg font-medium text-yellow-800">Account Inactive</h3>
                <div class="mt-2 text-sm text-yellow-700">
                    <p>Your account is pending activation by an administrator.</p>
                    <p class="mt-1">You will receive an email once your account has been approved.</p>
                </div>
                <div class="mt-4">
                    <a href="{% url 'account_login' %}" class="text-sm text-indigo-600 hover:text-indigo-500">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

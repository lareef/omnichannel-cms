{% for field in fields %}
<div class="mb-4">
    <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
    {% if field.field_type == 'text' %}
        <input type="text" name="dynamic_{{ field.field_key }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    {% elif field.field_type == 'number' %}
        <input type="number" name="dynamic_{{ field.field_key }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    {% elif field.field_type == 'select' and field.choices %}
        <select name="dynamic_{{ field.field_key }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
            <option value="">---------</option>
            {% for choice in field.choices %}
                <option value="{{ choice.value }}">{{ choice.label }}</option>
            {% endfor %}
        </select>
    {% elif field.field_type == 'date' %}
        <input type="date" name="dynamic_{{ field.field_key }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
    {% endif %}
    {% if field.is_required %}<span class="text-xs text-red-500">Required</span>{% endif %}
</div>
{% endfor %}
